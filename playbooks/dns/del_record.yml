---
- name: Atualizar DNS - REMOVER registro A e PTR
  hosts: localhost
  gather_facts: false

  vars:
    host_ip:
    host_name: web01.aroque.com.br

    dns_server: "192.168.100.11"
    dns_zone: "aroque.com.br"
    dns_reverse_zone: "100.168.192.in-addr.arpa"
    dns_key_name: "ansible-key"
    dns_key_secret: ""
    dns_key_algorithm: "hmac-sha256"

  collections:
    - community.general

  tasks:

    - name: Resolver host_name (DNS direto)
      ansible.builtin.set_fact:
        resolved_ip: "{{ lookup('community.general.dig', host_name, '@' + dns_server) }}"

    - name: Validar resolução direta
      ansible.builtin.debug:
        msg: "Hostname {{ host_name | default('') }} resolvido para {{ resolved_ip | default('N/A') }}"

    - name: Definir host_ip a partir do DNS (quando não informado)
      ansible.builtin.set_fact:
        host_ip: "{{ resolved_ip }}"
      when: host_ip is not defined or host_ip == none or host_ip == ""

    - name: Resolver IP (DNS reverso)
      ansible.builtin.command: "dig -x {{ host_ip | default(resolved_ip, true) }} @{{ dns_server }} +short"
      register: dig_reverse_result
      changed_when: false
      failed_when: false

    - name: Validar resolução reversa
      ansible.builtin.debug:
        msg: "IP {{ host_ip | default('') }} resolvido para {{ dig_reverse_result.stdout | default('N/A') | trim }}"

    - name: Remover registro A do DNS
      community.general.nsupdate:
        server: "{{ dns_server }}"
        zone: "{{ dns_zone }}"
        record: "{{ host_name.split('.')[0] }}"
        type: A
        value: "{{ host_ip | default(resolved_ip, true) }}"
        ttl: 300
        key_name: "{{ dns_key_name }}"
        key_secret: "{{ dns_key_secret }}"
        key_algorithm: "{{ dns_key_algorithm }}"
        state: absent

    - name: Remover registro PTR do DNS reverso
      community.general.nsupdate:
        server: "{{ dns_server }}"
        zone: "{{ dns_reverse_zone }}"
        record: "{{ (host_ip | default(resolved_ip, true)).split('.')[-1] }}.{{ dns_reverse_zone }}"
        type: PTR
        value: "{{ host_name.split('.')[0] }}"
        ttl: 300
        key_name: "{{ dns_key_name }}"
        key_secret: "{{ dns_key_secret }}"
        key_algorithm: "{{ dns_key_algorithm }}"
        state: absent

    - name: Debug variable host_ip
      ansible.builtin.debug:
        var: host_ip

    - name: Debug variable host_name
      ansible.builtin.debug:
        var: host_name

    - name: Export host_ip to another job template
      ansible.builtin.set_stats:
        data:
          host_ip: "{{ host_ip }}"
          host_name: "{{ host_name }}"
          hostname: "{{ host_name }}"

