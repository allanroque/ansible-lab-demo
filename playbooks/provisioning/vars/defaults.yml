---
# =============================================================================
# AIOps Lab - Variáveis de Provisionamento AWS
# =============================================================================
# Estas variáveis ficam no extra_vars do Job Template no AAP.
# O Survey expõe os campos editáveis pelo operador.
#
# Survey fields:
#   aws_name_tag           → Nome/tag da instância (ex: webserver-01)
#   server_role            → Função/Role tag (ex: webserver, appserver)
#   server_group           → Grupo/aplicação tag (ex: webservers, app_tier)
#   aws_instance_size      → Modelo EC2 (ex: t2.micro, t3.medium)
#   aws_instance_count     → Quantidade de instâncias
#   aws_region             → Região AWS
# =============================================================================

# --- AWS Instance ---
aws_name_tag: "ansible"
aws_instance_size: "t2.micro"
aws_instance_count: 3
aws_region: "us-east-2"

# --- Tags para inventário dinâmico ---
server_role: "webserver"
server_group: "webservers"

# --- SSH (chave pública como string) ---
aws_instance_public_key: ""

# --- Terraform S3 Backend ---
s3_backend_bucket: "terraform-state-ansible-283736470100"
s3_backend_key: "ansible-lab-dr/terraform.tfstate"
s3_backend_region: "us-east-2"
dynamodb_lock_table: "terraform-lock-ansible-283736470100"

# --- Terraform ---
terraform_project_dir: "/tmp/terraform/{{ aws_name_tag }}"
terraform_binary: "/usr/bin/terraform"

# --- Credenciais AWS (via AAP Credential) ---
# aws_access_key_id: ""
# aws_secret_access_key: ""

# --- Configuração pós-provisionamento ---
ansible_user: "ec2-user"
ansible_ssh_private_key_file: "~/.ssh/id_ed25519"

# --- Monitoring ---
loki_server: "192.168.100.1:3100"
