---
# =============================================================================
# AIOps Lab - Configurar Servidor por Role
# =============================================================================
# Executa após provisionamento. Configura o servidor baseado no seu role.
# Pode ser executado standalone contra host existente.
#
# Uso:
#   ansible-playbook configure-servers.yml -i inventory
#   No AAP: Job Template com inventário dinâmico AWS
# =============================================================================

# --- Webservers: Apache + Firewall ---
- name: Configurar Webserver (Apache)
  hosts: webservers
  become: true
  gather_facts: true

  vars:
    configure_apache: true

  tasks:
    - name: Instalar Apache (httpd)
      ansible.builtin.dnf:
        name:
          - httpd
          - mod_ssl
        state: present
      when: configure_apache | bool

    - name: Criar página de status
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        mode: '0644'
        content: |
          <html>
          <head><title>AIOps Lab - {{ inventory_hostname }}</title></head>
          <body style="background:#0a0a0f;color:#00d4ff;font-family:monospace;padding:40px">
          <h1>AIOps Lab - {{ inventory_hostname }}</h1>
          <p>Role: {{ server_role | default('webserver') }}</p>
          <p>Group: {{ server_group | default('webservers') }}</p>
          <p>IP: {{ ansible_default_ipv4.address | default(ansible_host) }}</p>
          <p>OS: {{ ansible_distribution }} {{ ansible_distribution_version }}</p>
          <p>Status: <span style="color:#00ff88">ONLINE</span></p>
          </body>
          </html>

    - name: Habilitar e iniciar Apache
      ansible.builtin.systemd:
        name: httpd
        state: started
        enabled: true

    - name: Abrir porta HTTP no firewall
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true

    - name: Abrir porta HTTPS no firewall
      ansible.posix.firewalld:
        service: https
        permanent: true
        state: enabled
        immediate: true

    - name: Verificar Apache respondendo
      ansible.builtin.uri:
        url: "http://localhost"
        status_code: 200
      register: apache_check

    - name: Status Apache
      ansible.builtin.debug:
        msg: "Apache OK em {{ inventory_hostname }} (HTTP {{ apache_check.status }})"

# --- Node Exporter ---
- name: Instalar Node Exporter (monitoramento)
  hosts: provisioned_servers
  become: true
  gather_facts: true

  vars:
    node_exporter_version: "1.7.0"
    configure_node_exporter: true

  tasks:
    - name: Verificar se Node Exporter já está instalado
      ansible.builtin.stat:
        path: /usr/local/bin/node_exporter
      register: ne_installed

    - name: Download Node Exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        mode: '0644'
      when:
        - configure_node_exporter | bool
        - not ne_installed.stat.exists

    - name: Extrair Node Exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp/"
        remote_src: true
      when:
        - configure_node_exporter | bool
        - not ne_installed.stat.exists

    - name: Mover binário para /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        remote_src: true
        mode: '0755'
      when:
        - configure_node_exporter | bool
        - not ne_installed.stat.exists

    - name: Criar usuário node_exporter
      ansible.builtin.user:
        name: node_exporter
        shell: /sbin/nologin
        system: true
        create_home: false

    - name: Criar service systemd para Node Exporter
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network-online.target

          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Habilitar e iniciar Node Exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true

    - name: Abrir porta 9100 no firewall
      ansible.posix.firewalld:
        port: 9100/tcp
        permanent: true
        state: enabled
        immediate: true

    - name: Verificar Node Exporter respondendo
      ansible.builtin.uri:
        url: "http://localhost:9100/metrics"
        status_code: 200
      register: ne_check

    - name: Status Node Exporter
      ansible.builtin.debug:
        msg: "Node Exporter OK em {{ inventory_hostname }} (HTTP {{ ne_check.status }})"

# --- Promtail ---
- name: Instalar Promtail (coleta de logs)
  hosts: provisioned_servers
  become: true
  gather_facts: true

  vars:
    promtail_version: "2.9.4"
    configure_promtail: true
    loki_server: "192.168.100.1:3100"

  tasks:
    - name: Verificar se Promtail já está instalado
      ansible.builtin.stat:
        path: /usr/local/bin/promtail
      register: pt_installed

    - name: Download Promtail
      ansible.builtin.get_url:
        url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
        dest: "/tmp/promtail.zip"
        mode: '0644'
      when:
        - configure_promtail | bool
        - not pt_installed.stat.exists

    - name: Instalar unzip
      ansible.builtin.dnf:
        name: unzip
        state: present
      when:
        - configure_promtail | bool
        - not pt_installed.stat.exists

    - name: Extrair Promtail
      ansible.builtin.unarchive:
        src: "/tmp/promtail.zip"
        dest: "/usr/local/bin/"
        remote_src: true
        mode: '0755'
      when:
        - configure_promtail | bool
        - not pt_installed.stat.exists

    - name: Criar diretório de configuração
      ansible.builtin.file:
        path: /etc/promtail
        state: directory
        mode: '0755'

    - name: Criar configuração Promtail
      ansible.builtin.copy:
        dest: /etc/promtail/config.yml
        mode: '0644'
        content: |
          server:
            http_listen_port: 9080
            grpc_listen_port: 0
          positions:
            filename: /tmp/positions.yaml
          clients:
            - url: http://{{ loki_server }}/loki/api/v1/push
          scrape_configs:
            - job_name: system
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: system
                    host: {{ inventory_hostname }}
                    role: {{ server_role | default('unknown') }}
                    __path__: /var/log/messages
            - job_name: httpd
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: httpd
                    host: {{ inventory_hostname }}
                    __path__: /var/log/httpd/*.log

    - name: Criar service systemd para Promtail
      ansible.builtin.copy:
        dest: /etc/systemd/system/promtail.service
        mode: '0644'
        content: |
          [Unit]
          Description=Promtail Log Collector
          After=network-online.target

          [Service]
          ExecStart=/usr/local/bin/promtail-linux-amd64 -config.file=/etc/promtail/config.yml
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Habilitar e iniciar Promtail
      ansible.builtin.systemd:
        name: promtail
        state: started
        enabled: true
        daemon_reload: true

    - name: Status Promtail
      ansible.builtin.debug:
        msg: "Promtail configurado em {{ inventory_hostname }} → Loki em {{ loki_server }}"
