---
# =============================================================================
# AIOps Lab - Provisionar Servidores AWS
# =============================================================================
# Extra vars do Job Template (Survey):
#   aws_name_tag           - Nome base das instâncias (ex: ansible)
#   server_role            - Tag Role (ex: webserver)
#   server_group           - Tag Group (ex: webservers)
#   aws_instance_size      - Modelo EC2 (ex: t2.micro)
#   aws_instance_count     - Quantidade de instâncias (ex: 3)
#   aws_region             - Região AWS (ex: us-east-2)
#   aws_instance_public_key - Chave SSH pública
#
# Uso CLI:
#   ansible-playbook provision-aws.yml \
#     -e "aws_name_tag=webserver server_role=webserver server_group=webservers"
# =============================================================================

- name: Provisionar servidores AWS via Terraform
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/defaults.yml

  tasks:
    # ---- Validações ----
    - name: Validar variáveis obrigatórias
      ansible.builtin.assert:
        that:
          - aws_name_tag is defined
          - aws_name_tag | length > 0
          - aws_instance_size is defined
          - aws_instance_count is defined
          - aws_instance_public_key is defined
          - aws_instance_public_key | length > 0
          - aws_region is defined
          - server_role is defined
          - server_group is defined
        fail_msg: "Variáveis obrigatórias: aws_name_tag, aws_instance_size, aws_instance_count, aws_instance_public_key, server_role, server_group"

    - name: Exibir plano de provisionamento
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════╗
          ║  AIOps Lab - Provisionamento AWS                     ║
          ╠══════════════════════════════════════════════════════╣
          ║  Name Tag:   {{ aws_name_tag }}
          ║  Role:       {{ server_role }}
          ║  Group:      {{ server_group }}
          ║  Tipo:       {{ aws_instance_size }}
          ║  Quantidade: {{ aws_instance_count }}
          ║  Região:     {{ aws_region }}
          ║  Backend:    s3://{{ s3_backend_bucket }}/{{ s3_backend_key }}
          ╚══════════════════════════════════════════════════════╝

    # ---- Preparar diretório Terraform ----
    - name: Criar diretório do projeto Terraform
      ansible.builtin.file:
        path: "{{ terraform_project_dir }}"
        state: directory
        mode: '0755'

    - name: Gerar main.tf
      ansible.builtin.template:
        src: templates/main.tf.j2
        dest: "{{ terraform_project_dir }}/main.tf"
        mode: '0644'

    - name: Gerar variables.tf
      ansible.builtin.template:
        src: templates/variables.tf.j2
        dest: "{{ terraform_project_dir }}/variables.tf"
        mode: '0644'

    - name: Gerar outputs.tf
      ansible.builtin.template:
        src: templates/outputs.tf.j2
        dest: "{{ terraform_project_dir }}/outputs.tf"
        mode: '0644'

    - name: Gerar backend.tf
      ansible.builtin.template:
        src: templates/backend.tf.j2
        dest: "{{ terraform_project_dir }}/backend.tf"
        mode: '0644'

    # ---- Executar Terraform ----
    - name: Inicializar e aplicar Terraform
      community.general.terraform:
        project_path: "{{ terraform_project_dir }}"
        state: present
        force_init: true
        binary_path: "{{ terraform_binary | default(omit) }}"
        variables:
          aws_region: "{{ aws_region }}"
          aws_name_tag: "{{ aws_name_tag }}"
          aws_instance_size: "{{ aws_instance_size }}"
          aws_instance_count: "{{ aws_instance_count }}"
          aws_instance_public_key: "{{ aws_instance_public_key }}"
          server_role: "{{ server_role }}"
          server_group: "{{ server_group }}"
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
      register: terraform_result

    - name: Exibir outputs do Terraform
      ansible.builtin.debug:
        var: terraform_result.outputs

    # ---- Processar resultados ----
    - name: Extrair informações dos servidores
      ansible.builtin.set_fact:
        server_list: "{{ terraform_result.outputs.server_info.value }}"

    # ---- Registrar hosts no inventário in-memory ----
    - name: Adicionar servidores ao inventário
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        ansible_host: "{{ item.public_ip }}"
        ansible_user: "{{ ansible_user | default('ec2-user') }}"
        ansible_ssh_private_key_file: "{{ ansible_ssh_private_key_file }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        groups:
          - provisioned_servers
          - "{{ item.group }}"
          - "{{ item.role }}"
        server_role: "{{ item.role }}"
        server_group: "{{ item.group }}"
        server_instance_type: "{{ item.instance_type }}"
        instance_id: "{{ item.instance_id }}"
        private_ip: "{{ item.private_ip }}"
      loop: "{{ server_list }}"
      loop_control:
        label: "{{ item.name }} → {{ item.public_ip }}"

    # ---- Aguardar SSH ----
    - name: Aguardar SSH ficar disponível
      ansible.builtin.wait_for:
        host: "{{ item.public_ip }}"
        port: 22
        delay: 15
        timeout: 300
        state: started
      loop: "{{ server_list }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Resumo do provisionamento
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════╗
          ║  PROVISIONAMENTO CONCLUÍDO                           ║
          ╠══════════════════════════════════════════════════════╣
          {% for srv in server_list %}
          ║  {{ srv.name }}:
          ║    Public IP:  {{ srv.public_ip }}
          ║    Private IP: {{ srv.private_ip }}
          ║    ID:         {{ srv.instance_id }}
          ║    Tipo:       {{ srv.instance_type }}
          ║    Role:       {{ srv.role }}
          ║    Group:      {{ srv.group }}
          {% endfor %}
          ╚══════════════════════════════════════════════════════╝

# =============================================================================
# Play 2: Configuração base dos servidores
# =============================================================================
- name: Configuração base dos servidores provisionados
  hosts: provisioned_servers
  become: true
  gather_facts: true

  tasks:
    - name: Aguardar cloud-init finalizar
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      timeout: 300

    - name: Atualizar pacotes do sistema
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_only: true

    - name: Instalar pacotes base
      ansible.builtin.dnf:
        name:
          - vim
          - curl
          - wget
          - net-tools
          - bind-utils
          - jq
          - python3
          - python3-pip
          - firewalld
          - chrony
          - stress
        state: present

    - name: Habilitar e iniciar firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Habilitar e iniciar chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

    - name: Definir hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Configurar SELinux como enforcing
      ansible.posix.selinux:
        policy: targeted
        state: enforcing

    - name: Exibir informações do servidor
      ansible.builtin.debug:
        msg: |
          Servidor: {{ inventory_hostname }}
          IP: {{ ansible_host }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Tipo: {{ server_instance_type | default('N/A') }}
          Role: {{ server_role | default('unknown') }}
          Group: {{ server_group | default('unknown') }}
