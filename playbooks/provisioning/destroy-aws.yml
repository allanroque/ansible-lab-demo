---
# =============================================================================
# AIOps Lab - Destruir Servidores AWS
# =============================================================================
# Uso:
#   ansible-playbook destroy-aws.yml -e "aws_name_tag=ansible"
# =============================================================================

- name: Destruir infraestrutura AWS
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/defaults.yml

  tasks:
    - name: Confirmar destruição
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════╗
          ║  ATENÇÃO: DESTRUINDO INFRAESTRUTURA                  ║
          ╠══════════════════════════════════════════════════════╣
          ║  Name Tag:  {{ aws_name_tag }}
          ║  Região:    {{ aws_region }}
          ║  Backend:   s3://{{ s3_backend_bucket }}/{{ s3_backend_key }}
          ╚══════════════════════════════════════════════════════╝

    - name: Verificar diretório Terraform
      ansible.builtin.stat:
        path: "{{ terraform_project_dir }}"
      register: tf_dir

    - name: Falhar se diretório não existe
      ansible.builtin.fail:
        msg: >
          Diretório Terraform não encontrado em {{ terraform_project_dir }}.
          Nada para destruir.
      when: not tf_dir.stat.exists

    - name: Executar terraform destroy
      community.general.terraform:
        project_path: "{{ terraform_project_dir }}"
        state: absent
        binary_path: "{{ terraform_binary | default(omit) }}"
        variables:
          aws_region: "{{ aws_region }}"
          aws_name_tag: "{{ aws_name_tag }}"
          aws_instance_size: "{{ aws_instance_size }}"
          aws_instance_count: "{{ aws_instance_count }}"
          aws_instance_public_key: "{{ aws_instance_public_key }}"
          server_role: "{{ server_role | default('') }}"
          server_group: "{{ server_group | default('') }}"
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
      register: destroy_result

    - name: Exibir resultado
      ansible.builtin.debug:
        var: destroy_result

    - name: Remover diretório Terraform local
      ansible.builtin.file:
        path: "{{ terraform_project_dir }}"
        state: absent
      when: cleanup_terraform_dir | default(false) | bool

    - name: Destruição concluída
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════╗
          ║  INFRAESTRUTURA DESTRUÍDA                            ║
          ╠══════════════════════════════════════════════════════╣
          ║  Name Tag: {{ aws_name_tag }}
          ║  Recursos AWS removidos.
          ╚══════════════════════════════════════════════════════╝
