---
# =============================================================================
# AIOps Lab - Destruir Infraestrutura AWS
# =============================================================================
# Executa terraform destroy e limpa tudo.
#
# Uso:
#   ansible-playbook destroy-aws.yml -e @vars/defaults.yml
#   ansible-playbook destroy-aws.yml -e "project_name=aiops-lab"
# =============================================================================

- name: Destruir infraestrutura AWS
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/defaults.yml

  tasks:
    - name: Confirmar destruição
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════╗
          ║  ATENÇÃO: DESTRUINDO INFRAESTRUTURA                  ║
          ╠══════════════════════════════════════════════════════╣
          ║  Projeto:  {{ project_name }}
          ║  Região:   {{ aws_region }}
          ║  Diretório: {{ terraform_project_dir }}
          ╚══════════════════════════════════════════════════════╝

    - name: Verificar diretório Terraform
      ansible.builtin.stat:
        path: "{{ terraform_project_dir }}"
      register: tf_dir

    - name: Falhar se diretório não existe
      ansible.builtin.fail:
        msg: >
          Diretório Terraform não encontrado em {{ terraform_project_dir }}.
          Nada para destruir.
      when: not tf_dir.stat.exists

    - name: Verificar se existe state file
      ansible.builtin.stat:
        path: "{{ terraform_project_dir }}/terraform.tfstate"
      register: tf_state

    - name: Aviso se não existe state
      ansible.builtin.debug:
        msg: "Nenhum terraform.tfstate encontrado. Pode não haver recursos para destruir."
      when: not tf_state.stat.exists

    # ---- Ler chave SSH (necessária para Terraform) ----
    - name: Ler chave SSH pública
      ansible.builtin.slurp:
        src: "{{ ssh_public_key_file }}"
      register: ssh_pub_key_content

    - name: Definir chave SSH
      ansible.builtin.set_fact:
        ssh_public_key: "{{ ssh_pub_key_content.content | b64decode | trim }}"

    # ---- Destruir ----
    - name: Executar terraform destroy
      community.general.terraform:
        project_path: "{{ terraform_project_dir }}"
        state: absent
        binary_path: "{{ terraform_binary | default(omit) }}"
        variables:
          aws_region: "{{ aws_region }}"
          project_name: "{{ project_name }}"
          environment: "{{ environment }}"
          ssh_public_key: "{{ ssh_public_key }}"
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
      register: destroy_result

    - name: Exibir resultado da destruição
      ansible.builtin.debug:
        var: destroy_result

    # ---- Limpeza opcional ----
    - name: Remover diretório Terraform local
      ansible.builtin.file:
        path: "{{ terraform_project_dir }}"
        state: absent
      when: cleanup_terraform_dir | default(false) | bool

    - name: Destruição concluída
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════╗
          ║  INFRAESTRUTURA DESTRUÍDA                            ║
          ╠══════════════════════════════════════════════════════╣
          ║  Projeto: {{ project_name }}
          ║  Todos os recursos AWS foram removidos.
          ╚══════════════════════════════════════════════════════╝
